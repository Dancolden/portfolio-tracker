name: Update Portfolio Tracker

on:
  push:
    paths:
      - '**.xlsx'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install openpyxl

      - run: python update_tracker.py

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add portfolio_tracker.html
          git diff --staged --quiet || git commit -m "Auto-update data $(date +'%Y-%m-%d')"
          git push
